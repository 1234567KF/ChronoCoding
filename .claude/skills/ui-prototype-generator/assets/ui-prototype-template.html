<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAGE_TITLE - UI 原型</title>

  <!-- ========== 组件库 CSS CDN ========== -->
  <!-- 仅引入 CSS 样式文件，MUST NOT 引入任何 JS 运行时 -->
  <!-- 默认使用 Ant Design v4 CSS；如选择其他组件库，替换此 link -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@4.24.16/dist/antd.min.css">

  <style>
    /* ========== 补充设计系统变量 ========== */
    /* 用于 antd CSS 未覆盖的自定义样式（布局、侧边栏等） */
    :root {
      --sidebar-width: 220px;
      --sidebar-collapsed-width: 64px;
      --navbar-height: 56px;
      --color-bg-page: #f5f6fa;
      --color-bg-sidebar: #001529;
      --color-text-sidebar: rgba(255, 255, 255, 0.65);
      --color-text-sidebar-active: #ffffff;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
    }

    /* 暗色模式补充变量 */
    [data-theme="dark"] {
      --color-bg-page: #141414;
      --color-bg-sidebar: #000000;
    }

    /* ========== 全局重置 ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      background: var(--color-bg-page);
      line-height: 1.6;
    }

    /* ========== 布局组件 ========== */
    .app-layout { display: flex; min-height: 100vh; }

    /* -- 侧边栏（antd 暗色菜单风格） -- */
    .sidebar {
      width: var(--sidebar-width); background: var(--color-bg-sidebar);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-logo {
      height: var(--navbar-height); display: flex; align-items: center; justify-content: center;
      color: #ffffff; font-size: 16px; font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* 侧边栏菜单使用 antd 暗色菜单类名 */
    .sidebar .ant-menu-dark { border-right: 0; }

    /* -- 主内容区 -- */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* -- 顶部导航栏 -- */
    .navbar {
      height: var(--navbar-height); background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--spacing-lg);
    }
    .navbar-title { font-size: 18px; font-weight: 600; }
    .navbar-actions { display: flex; align-items: center; gap: var(--spacing-md); }

    /* -- 页面内容 -- */
    .page-content { flex: 1; padding: var(--spacing-lg); overflow-y: auto; }

    /* ========== 布局辅助 ========== */
    .card-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
    .search-row { display: flex; align-items: flex-end; gap: var(--spacing-sm); flex-wrap: wrap; }
    .search-row .ant-form-item { margin-bottom: 0; }
    .table-actions a { margin-right: var(--spacing-sm); }
    .table-actions a:last-child { margin-right: 0; }

    /* ========== 响应式断点 ========== */
    @media (max-width: 575.98px) {
      .sidebar { display: none; }
      .page-content { padding: var(--spacing-md); }
      .search-row { flex-direction: column; }
    }
    @media (min-width: 576px) and (max-width: 767.98px) {
      .sidebar { width: var(--sidebar-collapsed-width); }
      .sidebar-logo { font-size: 14px; }
    }
    @media (min-width: 768px) and (max-width: 1023.98px) {
      .sidebar { width: 180px; }
    }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- PRD章节: SIDEBAR_PRD_SECTION -->
    <aside class="sidebar">
      <div class="sidebar-logo">LOGO_TEXT</div>
      <ul class="ant-menu ant-menu-dark ant-menu-root ant-menu-inline">
        <li class="ant-menu-item ant-menu-item-selected">MENU_ITEM_1</li>
        <li class="ant-menu-item">MENU_ITEM_2</li>
        <li class="ant-menu-item">MENU_ITEM_3</li>
        <li class="ant-menu-item">MENU_ITEM_4</li>
      </ul>
    </aside>

    <div class="main-area">
      <!-- PRD章节: NAVBAR_PRD_SECTION -->
      <nav class="navbar">
        <span class="navbar-title">PAGE_TITLE</span>
        <div class="navbar-actions">
          <button class="ant-btn ant-btn-default ant-btn-circle" id="theme-toggle" title="切换主题">🌓</button>
          <span>ADMIN_USER</span>
        </div>
      </nav>

      <main class="page-content">
        <!-- PRD章节: SEARCH_PRD_SECTION -->
        <div class="ant-card">
          <div class="ant-card-body">
            <div class="search-row">
              <div class="ant-form-item">
                <div class="ant-form-item-label"><label>SEARCH_LABEL</label></div>
                <div class="ant-form-item-control">
                  <input class="ant-input" placeholder="SEARCH_PLACEHOLDER" />
                </div>
              </div>
              <div style="display:flex; gap:var(--spacing-sm);">
                <button class="ant-btn ant-btn-primary">查询</button>
                <button class="ant-btn ant-btn-default">重置</button>
              </div>
            </div>
          </div>
        </div>

        <!-- PRD章节: TABLE_PRD_SECTION -->
        <div class="ant-card" style="margin-top: var(--spacing-md);">
          <div class="ant-card-body">
            <div class="card-toolbar">
              <span style="font-size:16px; font-weight:600;">TABLE_TITLE</span>
              <button class="ant-btn ant-btn-primary">+ 新增</button>
            </div>
            <div class="ant-table ant-table-default">
              <div class="ant-table-container">
                <table style="width:100%; table-layout:auto;">
                  <thead class="ant-table-thead">
                    <tr>
                      <th class="ant-table-cell">COL_HEADER_1</th>
                      <th class="ant-table-cell">COL_HEADER_2</th>
                      <th class="ant-table-cell">COL_HEADER_3</th>
                      <th class="ant-table-cell">状态</th>
                      <th class="ant-table-cell">操作</th>
                    </tr>
                  </thead>
                  <tbody class="ant-table-tbody">
                    <tr class="ant-table-row">
                      <td class="ant-table-cell">SAMPLE_DATA_1</td>
                      <td class="ant-table-cell">SAMPLE_DATA_2</td>
                      <td class="ant-table-cell">SAMPLE_DATA_3</td>
                      <td class="ant-table-cell"><span class="ant-tag ant-tag-green">正常</span></td>
                      <td class="ant-table-cell table-actions">
                        <a class="ant-btn ant-btn-link ant-btn-sm">编辑</a>
                        <a class="ant-btn ant-btn-link ant-btn-sm ant-btn-dangerous">删除</a>
                      </td>
                    </tr>
                    <tr class="ant-table-row">
                      <td class="ant-table-cell">SAMPLE_DATA_1</td>
                      <td class="ant-table-cell">SAMPLE_DATA_2</td>
                      <td class="ant-table-cell">SAMPLE_DATA_3</td>
                      <td class="ant-table-cell"><span class="ant-tag ant-tag-orange">待审核</span></td>
                      <td class="ant-table-cell table-actions">
                        <a class="ant-btn ant-btn-link ant-btn-sm">编辑</a>
                        <a class="ant-btn ant-btn-link ant-btn-sm ant-btn-dangerous">删除</a>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <ul class="ant-pagination" style="margin-top: var(--spacing-md); justify-content: flex-end; display: flex;">
              <li class="ant-pagination-prev"><button class="ant-pagination-item-link">上一页</button></li>
              <li class="ant-pagination-item ant-pagination-item-active"><a>1</a></li>
              <li class="ant-pagination-item"><a>2</a></li>
              <li class="ant-pagination-item"><a>3</a></li>
              <li class="ant-pagination-next"><button class="ant-pagination-item-link">下一页</button></li>
            </ul>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    /* 暗色模式切换 — 纯原生 JS，无框架依赖 */
    document.getElementById('theme-toggle').addEventListener('click', function () {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? '' : 'dark';
    });
  </script>
</body>
</html>
