<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT_NAME - UI 原型</title>

  <!-- ========== 组件库 CSS CDN ========== -->
  <!-- 仅引入 CSS 样式文件，MUST NOT 引入任何 JS 运行时 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@4.24.16/dist/antd.min.css">

  <!-- ========== 共享骨架样式（多页面唯一来源） ========== -->
  <!-- MUST 引用 assets/shared.css；MUST NOT 在下方 <style> 中重复定义骨架类 -->
  <!-- 路径规则：本文件位于 prototype/ 根目录 → 使用 assets/shared.css -->
  <link rel="stylesheet" href="assets/shared.css">

  <!-- 仅在本页确有特殊样式时才追加（如本页独有的图表容器、特殊布局等） -->
  <!-- <style> /* page-specific styles only */ </style> -->
</head>
<body>
  <div class="app-layout">

    <!-- ============================================================
         ⚠️ 标准侧边栏 snippet（菜单单一来源）
         ⚠️ MUST 从「标准菜单 snippet」原样复制此区块
         ⚠️ index.html 当前页菜单项为「首页」，标记 ant-menu-item-selected
         ⚠️ 一级菜单项链接使用相对路径：MODULE_DIR_X/list.html（无 ../ 前缀）
         ⚠️ MUST NOT 增删菜单项、MUST NOT 改菜单项顺序、MUST NOT 改链接 href
         ============================================================ -->
    <aside class="sidebar">
      <div class="sidebar-logo">LOGO_TEXT</div>
      <ul class="ant-menu ant-menu-dark ant-menu-root ant-menu-inline">
        <!-- 当前页：首页 -->
        <li class="ant-menu-item ant-menu-item-selected">首页</li>
        <!-- 一级菜单项 → 使用 <a href> 链接到各模块默认页面 -->
        <li class="ant-menu-item"><a href="MODULE_DIR_1/list.html">MENU_ITEM_1</a></li>
        <li class="ant-menu-item"><a href="MODULE_DIR_2/list.html">MENU_ITEM_2</a></li>
        <li class="ant-menu-item"><a href="MODULE_DIR_3/list.html">MENU_ITEM_3</a></li>
      </ul>
    </aside>

    <div class="main-area">
      <!-- 顶栏 -->
      <nav class="navbar">
        <span class="navbar-title">PROJECT_NAME</span>
        <div class="navbar-actions">
          <span>ADMIN_USER</span>
        </div>
      </nav>

      <!-- ========== index.html 三段式内容 ========== -->
      <main class="page-content">

        <!-- 第一段：项目标识区 -->
        <div class="project-header">
          <h1>PROJECT_NAME <span class="version">VERSION</span></h1>
          <p class="meta">原型生成日期：GENERATE_DATE</p>
        </div>

        <!-- 第二段：描述区 — 新项目场景 -->
        <div class="project-desc">
          <h2>项目背景</h2>
          <p>PROJECT_BACKGROUND</p>
          <h2>功能概述</h2>
          <ul>
            <li>FEATURE_1</li>
            <li>FEATURE_2</li>
            <li>FEATURE_3</li>
          </ul>
        </div>

        <!-- 第二段：描述区 — 迭代开发场景（替换上方新项目描述区） -->
        <!--
        <div class="project-desc">
          <h2>本轮迭代：VERSION</h2>
          <ul class="change-list">
            <li class="change-added">[新增] CHANGE_ADDED</li>
            <li class="change-modified">[变更] CHANGE_MODIFIED</li>
            <li class="change-fixed">[修复] CHANGE_FIXED</li>
          </ul>
          <p class="change-note">仅上述变更项涉及页面已更新，其他页面保持不变。</p>
        </div>
        -->

        <!-- 第三段：快捷入口区 -->
        <div class="quick-links">
          <a href="MODULE_DIR_1/list.html" class="link-card">
            <div class="card-title">MENU_ITEM_1</div>
            <div class="card-desc">MODULE_DESC_1</div>
          </a>
          <a href="MODULE_DIR_2/list.html" class="link-card">
            <div class="card-title">MENU_ITEM_2</div>
            <div class="card-desc">MODULE_DESC_2</div>
          </a>
          <a href="MODULE_DIR_3/list.html" class="link-card">
            <div class="card-title">MENU_ITEM_3</div>
            <div class="card-desc">MODULE_DESC_3</div>
          </a>
        </div>

      </main>
    </div>
  </div>
</body>
</html>
